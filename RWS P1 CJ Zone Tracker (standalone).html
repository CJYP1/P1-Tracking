  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ar(--txt)}\n.mkbadge{font-size:8.5px;font-weight:800;padding:1px 6px;border-radius:9px;background:var(--accent);color:#fff}\n#modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:26px}\n#modal.open{display:flex}\n#modal .mbox{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(940px,96vw);max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(0,0,0,.4)}\n#modal .mhd{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line)}\n#modal .mt{font-size:14px;font-weight:700}\n#modal .mbody{overflow:auto;padding:6px 0}\ntable.reg{width:100%;border-collapse:collapse;font-size:11px}\ntable.reg th{position:sticky;top:0;background:var(--panel2);color:var(--dim);font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap}\ntable.reg td{padding:7px 10px;border-bottom:1px solid var(--line);color:var(--txt);white-space:nowrap}\ntable.reg tr:hover td{background:var(--panel2)}\ntable.reg .num{text-align:right;font-variant-numeric:tabular-nums}\ntable.reg .mrk td{border-left:2px solid var(--accent)}\ntable.reg .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}\n<\u002Fstyle>\n<script src=\"83715888-dcd6-4dda-a940-d1a25eab96c0\"><\u002Fscript>\n<script src=\"200a9194-6cb2-4ee2-ae8b-08fc27652920\"><\u002Fscript>\n<script src=\"3952b2c0-17e6-4ebc-a5f0-d1660b7d7a19\"><\u002Fscript>\n<\u002Fhelmet>\n<div id=\"app\" ref=\"{{ rootRef }}\">\n  <header>\n    <div class=\"mark\"><\u002Fdiv>\n    <div><h1>RWS P1 · CJ — Zone Resource &amp; Progress Map (P1 Planning)<\u002Fh1><div class=\"sub\">Quantities &amp; site progress per zone<\u002Fdiv><\u002Fdiv>\n    <div class=\"spacer\"><\u002Fdiv>\n    <span id=\"autosave\" style=\"font-size:10px;color:var(--faint);font-weight:600\">Autosave on<\u002Fspan>\n    <button class=\"hbtn primary\" id=\"openSched\">📅 Construction Schedule<\u002Fbutton>\n    <button class=\"hbtn primary\" id=\"saveLock\" title=\"Save the whole page — all progress embedded — as one HTML file to forward or archive\">💾 Save<\u002Fbutton>\n    <button class=\"hbtn\" id=\"loadLock\" title=\"Open a previously saved file to continue from its data\">📂 Open<\u002Fbutton>\n    <button class=\"hbtn\" id=\"exportXls\" title=\"Export the progress table to Excel\">⬇ Excel<\u002Fbutton>\n    <button class=\"hbtn\" id=\"openTable\" title=\"Full progress table of every zone (review / print)\">▤ Table <span class=\"cnt\" id=\"elemCnt\">0<\u002Fspan><\u002Fbutton>\n    <input id=\"lockFile\" type=\"file\" accept=\".json,.html,.xls,.csv\" style=\"display:none\">\n    <div class=\"seg\" id=\"themeseg\"><button data-t=\"light\" class=\"on\">Light<\u002Fbutton><button data-t=\"dark\">Dark<\u002Fbutton><\u002Fdiv>\n  <\u002Fheader>\n  <div id=\"body\">\n    <div id=\"rail\"><\u002Fdiv>\n    <div id=\"center\">\n      <div id=\"metrics\"><\u002Fdiv>\n      <div id=\"areastrip\"><\u002Fdiv>\n      <div id=\"stagewrap\">\n        <svg id=\"svg\"><\u002Fsvg>\n        <div id=\"tip\"><\u002Fdiv>\n        <div id=\"legend\"><\u002Fdiv>\n        <div id=\"zoomhint\">scroll = zoom · drag = pan · dbl-click = reset<\u002Fdiv>\n        <div id=\"emptyfloor\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"side\">\n      <div class=\"hd\" id=\"sideTitle\">Level summary<\u002Fdiv>\n      <div id=\"kpis\"><\u002Fdiv>\n      <div id=\"progroll\"><\u002Fdiv>\n      <div id=\"sidebody\"><\u002Fdiv>\n      <div class=\"foot\" id=\"foot\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"modal\"><div class=\"mbox\"><div class=\"mhd\"><div class=\"mt\">Site Update Register<\u002Fdiv><div style=\"display:flex;gap:8px\"><button class=\"hbtn primary\" id=\"mExport\">↓ Export Excel<\u002Fbutton><button class=\"hbtn\" id=\"mClose\">Close<\u002Fbutton><\u002Fdiv><\u002Fdiv><div class=\"mbody\" id=\"mbody\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div id=\"schedpage\">\n    <div class=\"shd\">\n      <div><div class=\"stt\">Construction Schedule<\u002Fdiv><div class=\"ssub\">Grouped by area → level → zone. Each card shows a zone's trades as of the selected month, filled by % complete. Click a card to enter completed quantities.<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacer\"><\u002Fdiv>\n      <input id=\"schQ\" type=\"text\" placeholder=\"Find a zone…\" style=\"background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:11.5px;color:var(--txt);font-family:inherit;width:130px;outline:none\">\n      <label style=\"display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--dim);cursor:pointer\"><input type=\"checkbox\" id=\"schCrit\" style=\"accent-color:var(--crit);cursor:pointer\">Critical only<\u002Flabel>\n      <div id=\"schedareas\"><\u002Fdiv>\n      <button class=\"hbtn\" id=\"schedClose\">Close ✕<\u002Fbutton>\n    <\u002Fdiv>\n    <div id=\"schedMonths\"><\u002Fdiv>\n    <div id=\"schedlegend\"><\u002Fdiv>\n    <div id=\"schedbody\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals(){ return { rootRef: el => { this.root = el; } }; }\n\n  componentDidMount(){\n    const boot=(DATA,CAT,OVL,ZP,T)=>{ this.DATA=DATA; this.CAT=CAT; this.OVL=OVL; this.ZP=ZP;\n      T.order.forEach(lv=>{if(!this.DATA.levels[lv]){this.DATA.order.push(lv);this.DATA.levels[lv]=T.levels[lv];this.DATA.levelTotals[lv]={...T.totals};}});\n      try{this.zpSetup();}catch(e){console.error('zp setup',e);}\n      this.init(); };\n    const g=window.__RWS;\n    if(g&&g.DATA&&g.ZP&&g.FLOOR_TEMPLATES){ boot(g.DATA,g.CAT,g.OVL,g.ZP,g.FLOOR_TEMPLATES); return; }\n    Promise.all([import('./zone-data.js'),import('./floor-templates.js'),import('./zp-data.js')]).then(([m,t,zp]) => {\n      boot(m.DATA, m.CAT, m.OVL, zp.ZP, t.FLOOR_TEMPLATES);\n    }).catch(e => { console.error('data load failed', e); });\n  }\n\n  init(){\n    this.METRICS = [\n      {k:'columns',label:'Columns'},{k:'pilecap',label:'Pile Caps'},{k:'mainbeam',label:'Main Beams'},\n      {k:'steelbeam',label:'Steel Beams'},{k:'liftstairAll',label:'Lift / Stair'},{k:'area',label:'Area m²'}];\n    this.STATUS = {todo:{v:'--todo',label:'Not started'},wip:{v:'--wip',label:'In progress'},done:{v:'--done',label:'Complete'}};\n    // axis: months since Jan 2024\n    this.axisA = 5; this.axisB = 36; this.today = 30; // Jul 2026\n    this.bands = {B2:[6,13],B1:[10,18],B1M:[15,22],L1:[20,28],L2:[24,35]};\n    this.bias  = {B2:0.93,B1:0.80,B1M:0.63,L1:0.42,L2:0.20};\n    this.curLevel = this.DATA.order[0];\n    this.colorMode = 'progress';\n    this.curMetric = 'columns';\n    this.selKey = null;\n    this.filterCat = 'all';\n    this.BCOL = {EB:'#c2410c',NB:'#be0f56',MA:'#1747b8'};\n    this.BDASH = {EB:'0',NB:'2600 1100',MA:'220 900'};\n    this.BCAP = {EB:'butt',NB:'butt',MA:'round'};\n    this.ASHORT = {EB:'Existing',NB:'New',MA:'Marine'};\n    this.showOvl = {podium:true,transfer:false,podcis:false};\n    this.showBeams = false; this.showSeq = true; this.showCrit = true; this.showAreaBounds = true;\n    this.loadUpdates();\n    this.loadElem();\n    this.deriveProgress();\n    this.svg = this.root.querySelector('#svg');\n    this.tip = this.root.querySelector('#tip');\n    this.vb = {x:0,y:0,w:1,h:1}; this.base = {x:0,y:0,w:1,h:1};\n    this.bindGlobal();\n    this.buildRail(); this.buildMetrics(); this.buildTimeline();\n    this.root.querySelector('#foot').innerHTML = 'Zones coloured by construction area / derived progress / quantity heat. Geometry & quantities from RWS P1 CJ source; progress derived from activity counts + bottom-up schedule model (demo).';\n    this.render();\n  }\n\n  /* ---------- helpers ---------- */\n  hash(s){s=String(s);let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return ((h>>>0)%100000)/100000;}\n  clamp(v,a,b){return Math.max(a,Math.min(b,v));}\n  lsAll(c){return (c.liftcw||0)+(c.stair||0)+(c.liftstair||0);}\n  mval(z,k){if(k==='area')return z.area||0;if(k==='liftstairAll')return this.lsAll(z.counts);return z.counts[k]||0;}\n  fmt(n){return (n||0).toLocaleString('en-US');}\n  esc(s){return (s+'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}\n  proj(p,H){return [p[0],H-p[1]];}\n  centroid(r,H){let x=0,y=0;r.forEach(p=>{x+=p[0];y+=H-p[1];});return[x/r.length,y/r.length];}\n  ml(m){const names=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return names[((m%12)+12)%12]+' '+(2024+Math.floor(m/12));}\n  hex2rgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}\n  lerpHex(a,b,t){const A=this.hex2rgb(a),B=this.hex2rgb(b);return 'rgb('+A.map((v,i)=>Math.round(v+(B[i]-v)*t)).join(',')+')';}\n  progColor(p){p=p/100;return p<0.5?this.lerpHex('#e5484d','#f5b23c',p/0.5):this.lerpHex('#f5b23c','#22c55e',(p-0.5)/0.5);}\n  cssvar(v){return getComputedStyle(this.root).getPropertyValue(v).trim();}\n  zid(z){return z.mk||('_'+z.lid);}\n  zoneVisible(z){return this.filterCat==='all'||(z.cat||'NB')===this.filterCat;}\n  progFilter(lv){const seen={},uniq=[];this.DATA.levels[lv].zones.forEach(z=>{if(!this.zoneVisible(z))return;const k=this.zid(z);if(!seen[k]){seen[k]=1;uniq.push(z);}});\n    let done=0,wip=0,todo=0,ws=0,wa=0;uniq.forEach(z=>{const p=z._p||{pct:0,status:'todo'};ws+=p.pct*(z.area||1);wa+=(z.area||1);if(p.status==='done')done++;else if(p.status==='wip')wip++;else todo++;});\n    return {avg:Math.round(ws/Math.max(1,wa)),done,wip,todo,count:uniq.length};}\n\n  deriveProgress(){\n    this.DATA.order.forEach(lv=>{\n      const seen={}, uniq=[];\n      this.DATA.levels[lv].zones.forEach(z=>{const k=z.mk||('_'+z.lid);if(!seen[k]){seen[k]=1;uniq.push(z);}});\n      uniq.sort((a,b)=>(a.lx||0)-(b.lx this.root.closest('html')?.setAttribute('data-theme',e.target.dataset.t);document.documentElement.setAttribute('data-theme',e.target.dataset.t);this.root.querySelectorAll('#themeseg button').forEach(b=>b.classList.toggle('on',b===e.target));this.buildMetrics();this.buildTimeline();this.render();}});\n    this.root.querySelector('#openTable').addEventListener('click',()=>this.openTable());\n    this.root.querySelector('#exportXls').addEventListener('click',()=>this.exportExcel());\n    this.root.querySelector('#saveLock').addEventListener('click',()=>this.saveLock());\n    const lf=this.root.querySelector('#lockFile');\n    this.root.querySelector('#loadLock').addEventListener('click',()=>lf.click());\n    lf.addEventListener('change',e=>{const f=e.target.files[0];if(f)this.loadLock(f);lf.value='';});\n    this.root.querySelector('#mExport').addEventListener('click',()=>this.exportExcel());\n    this.root.querySelector('#mClose').addEventListener('click',()=>this.root.querySelector('#modal').classList.remove('open'));\n    this.root.querySelector('#openSched').addEventListener('click',()=>this.openSched());\n    this.root.querySelector('#schedClose').addEventListener('click',()=>this.root.querySelector('#schedpage').classList.remove('open'));\n    this.root.querySelector('#modal').addEventListener('click',e=>{if(e.target.id==='modal')e.target.classList.remove('open');});\n    this.refreshUpdBadge();\n  }\n\n  /* ---------- register table + Excel export ---------- */\n  registerRows(){\n    const rows=[];\n    this.DATA.order.forEach(lv=>{\n      const seen={},uniq=[];\n      this.DATA.levels[lv].zones.forEach(z=>{const k=z.mk||('_'+z.lid);if(!seen[k]){seen[k]=1;uniq.push(z);}});\n      uniq.sort((a,b)=>(a._base?a._base.seq:0)-(b._base?b._base.seq:0));\n      uniq.forEach(z=>{const c=z.counts,p=z._p||{},b=z._base||{},u=this.latestUpdate(z.mk);\n        const _zn=this.zpMatchOf(z); const _zpct=_zn?this.zoneOverallPct(_zn):null;\n        rows.push({lv,zone:z.label,cat:( e name to show it on the map. Entered quantities are saved into this file.<\u002Fdiv>`;\n    this.root.querySelector('#howmodal').classList.add('open');\n  }\n\n  openTable(){\n    const rows=this.registerRows();\n    const cols=[['Level','lv'],['Zone','zone'],['Category','cat'],['Pour group','grp'],['Critical','crit'],\n      ['Area m²','area','num'],['Columns','columns','num'],['Pile caps','pilecap','num'],['Main beams','mainbeam','num'],['Steel beams','steelbeam','num'],['Lift/Stair','liftstair','num'],\n      ['Seq','seq','num'],['Plan start','planStart'],['Plan end','planEnd'],['Derived %','derivedPct','num'],['Actual %','actualPct','num'],['Status','status'],['Updated','udate'],['Crew','crew'],['Note','note'],['Updates','n_updates','num']];\n    const dc=this.cssvar('--done'),wc=this.cssvar('--wip'),tc=this.cssvar('--todo');\n    const dotFor=s=>s==='Complete'?dc:s==='In progress'?wc:tc;\n    let html=`<table class=\"reg\"><thead><tr>${cols.map(c=>`<th class=\"${c[2]==='num'?'num':''}\">${c[0]}<\u002Fth>`).join('')}<\u002Ftr><\u002Fthead><tbody>`;\n    rows.forEach(r=>{const manual=r.actualPct!=='';\n      html+=`<tr class=\"${manual?'mrk':''}\">${cols.map(c=>{let v=r[c[1]];\n        if(c[1]==='area')v=this.fmt(v);\n        if(c[1]==='status'&&v)v=`<span class=\"dot\" style=\"background:${dotFor(v)}\"><\u002Fspan>${v}`;\n        return `<td class=\"${c[2]==='num'?'num':''}\">${v===''||v==null?'<span style=\"color:var(--faint)\">—<\u002Fspan>':v}<\u002Ftd>`;}).join('')}<\u002Ftr>`;});\n    html+='<\u002Ftbody><\u002Ftable>';\n    if(!rows.length)html='<div class=\"empty\" style=\"padding:24px\">No zones.<\u002Fdiv>';\n    const box=this.root.querySelector('#mbody');\n    box.innerHTML=`<div style=\"padding:8px 18px;font-size:11px;color:var(--dim)\"><b style=\"color:var(--txt)\">${rows.length}<\u002Fb> zones · <b style=\"color:var(--accent)\">${rows.filter(r=>r.actualPct!=='').length}<\u002Fb> with site-entered actuals (blue bar). Saving an update in a zone panel refreshes this register and the exported Excel.<\u002Fdiv>`+html;\n    this.root.querySelector('#modal').classList.add('open');\n  }\n\n  exportExcel(){\n    const rows=this.registerRows();\n    const heads=['Level','Zone','Category','PourGroup','Critical','Area_m2','Columns','PileCaps','MainBeams','SteelBeams','Lift_Stair','Seq','PlanStart','PlanEnd','DerivedPct','ActualPct','Status','UpdateDate','Crew','Note','UpdateCount'];\n    const keys=['lv','zone','cat','grp','crit','area','columns','pilecap','mainbeam','steelbeam','liftstair','seq','planStart','planEnd','derivedPct','actualPct','status','udate','crew','note','n_updates'];\n    const esc=v=>('<td>'+String(v==null?'':v).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;')+'<\u002Ftd>');\n    let t='<table border=\"1\"><tr>'+heads.map(h=>`<th style=\"background:#dfe6f2;font-weight:bold\">${h}<\u002Fth>`).join('')+'<\u002Ftr>';\n    rows.forEach(r=>{t+='<tr>'+keys.map(k=>esc(r[k])).join('')+'<\u002Ftr>';});\n    t+='<\u002Ftable>';\n    // Element-level detail (every marked element)\n    const lmap={},zmap={};this.DATA.order.forEach(lv=>this.DATA.levels[lv].zones.forEach(z=>{if(z.mk){zmap[z.mk]=z.label;lmap[z.mk]=lmap[z.mk]||lv;}}));\n    const stLbl={wip:'In progress',done:'Complete'};\n    const eRows=Object.keys(this.elem).map(k=>{const[lv,mk,type,id]=k.split('||');return{lv,zone:zmap[mk]||mk,type,id,status:stLbl[this.elem[k]]||this.elem[k]};})\n      .sort((a,b)=>a.lv.localeCompare(b.lv)||a.zone.localeCompare(b.zone)||a.type.localeCompare(b.type));\n    let et='';\n    if(eRows.length){\n      const eh=['Level','Zone','ElementType','ElementID','Status'];\n      et='<br><table border=\"1\"><tr><td colspan=\"5\" style=\"font-weight:bold;background:#e6efe0\">Element Detail (marked '+eRows.length+')<\u002Ftd><\u002Ftr><tr>'+eh.map(h=>`<th style=\"background:#dfe6f2;font-weight:bold\">${h}<\u002Fth>`).join('')+'<\u002Ftr>';\n      eRows.forEach(r=>{et+='<tr>'+[r.lv,r.zone,r.type,r.id,r.status].map(esc).join('')+'<\ ocument.createElement('a');\n    a.href=url;a.download=`RWS_P1_CJ_Tracker_${stamp}.html`;document.body.appendChild(a);a.click();\n    setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},500);\n  }\n  buildLabelMap(){this.labelMap={};this.DATA.order.forEach(lv=>this.DATA.levels[lv].zones.forEach(z=>{this.labelMap[lv+'||'+z.label]=(z.mk||('_'+z.lid));}));}\n  loadLock(file){\n    const r=new FileReader();\n    r.onload=()=>{try{\n      let txt=String(r.result);let elemN=0,updN=0;\n      const m=txt.match(/<script id=\"locked-data\"[^>]*>([\\s\\S]*?)<\\/script>/i);\n      if(m||(txt.trim()[0]==='{')){\n        const data=JSON.parse(m?m[1]:txt);\n        if(data.elem){this.elem={...this.elem,...data.elem};elemN=Object.keys(data.elem).length;}\n        if(data.updates){Object.keys(data.updates).forEach(k=>{this.updates[k]=data.updates[k];});updN=Object.keys(data.updates).length;}\n      } else {\n        // Excel/CSV/HTML-table archive: restore element marks from the Element Detail table\n        this.buildLabelMap();\n        const codeOf=s=>{s=(s||'').trim();return /complete|done/i.test(s)?'done':/progress|wip/i.test(s)?'wip':'todo';};\n        let rowsHtml=[];\n        const doc=new DOMParser().parseFromString(txt,'text/html');\n        const trs=[...doc.querySelectorAll('tr')];\n        if(trs.length){\n          let cols=null;\n          trs.forEach(tr=>{const cells=[...tr.children].map(td=>td.textContent.trim());\n            if(cells.some(c=>/elementid/i.test(c))){cols={lv:cells.findIndex(c=>/^level$/i.test(c)),zone:cells.findIndex(c=>/^zone$/i.test(c)),type:cells.findIndex(c=>/elementtype/i.test(c)),id:cells.findIndex(c=>/elementid/i.test(c)),st:cells.findIndex(c=>/^status$/i.test(c))};return;}\n            if(cols&&cells.length>=5&&cells[cols.id]){const idp=this.labelMap[cells[cols.lv]+'||'+cells[cols.zone]];if(!idp)return;const st=codeOf(cells[cols.st]);const key=cells[cols.lv]+'||'+idp+'||'+cells[cols.type]+'||'+cells[cols.id];if(st==='todo')delete this.elem[key];else{this.elem[key]=st;}elemN++;}});\n        } else {\n          // CSV fallback\n          txt.split(/\\r?\\n/).forEach(line=>{const c=line.split(',').map(x=>x.replace(/^\"|\"$/g,'').trim());if(c.length>=5&&/elementid/i.test(line)===false&&c[3]){const idp=this.labelMap[c[0]+'||'+c[1]];if(!idp)return;const st=codeOf(c[4]);const key=c[0]+'||'+idp+'||'+c[2]+'||'+c[3];if(st!=='todo'){this.elem[key]=st;elemN++;}}});\n        }\n        if(!elemN){alert('No recognisable element detail found in the file (needs an Element Detail table).');return;}\n      }\n      this.saveElem();this.saveUpdatesStore();this.applyUpdates();\n      this.buildRail();this.buildTimeline();this.render();this.refreshUpdBadge();\n      if(this.selKey){const z=this.DATA.levels[this.curLevel].zones.find(x=>this.zid(x)===this.selKey);if(z)this.selectZone(z);}\n      alert('Loaded: '+this.doneCount()+' elements done, '+this.updateCount()+' zone entries. You can keep updating.');\n    }catch(err){alert('Could not parse file: '+err.message);}};\n    r.readAsText(file);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
